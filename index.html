
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Besuchsbestätigung / Aufmaß-Protokoll</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
h2 { text-align: center; }
label { font-weight: bold; display:block; margin-top:10px; }
input, textarea { width:100%; padding:8px; margin-top:4px; }
canvas { border:1px solid #000; width:100%; height:200px; }
button { width:100%; padding:12px; margin-top:10px; font-size:16px; }
</style>
</head>
<body>

<h2>Besuchsbestätigung / Aufmaß‑Protokoll</h2>

<label>Firma</label>
<input id="firma" value="Dein Firmenname">

<label>Objektadresse</label>
<textarea id="adresse"></textarea>

<label>Pauschale (€ zzgl. MwSt.)</label>
<input id="betrag">

<label>Ort</label>
<input id="ort">

<label>Datum</label>
<input type="date" id="datum">

<p>
Hiermit bestätigt der Auftraggeber, dass am genannten Objekt ein technisches Aufmaß
sowie eine Fachberatung durchgeführt wurden.
</p>

<p>
Bei Auftragserteilung innerhalb von 30 Tagen ab Angebotsdatum wird die Pauschale
vollständig angerechnet.
</p>

<label>Unterschrift Auftraggeber</label>
<canvas id="signature"></canvas>
<button onclick="signaturePad.clear()">Unterschrift löschen</button>
<button onclick="generatePDF()">PDF erstellen</button>

<script>
const canvas = document.getElementById('signature');
const signaturePad = new SignaturePad(canvas);

function generatePDF() {
  if (signaturePad.isEmpty()) {
    alert("Bitte unterschreiben");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  pdf.setFontSize(12);
  pdf.text("Besuchsbestätigung / Aufmaß-Protokoll", 14, 20);
  pdf.text("Firma: " + firma.value, 14, 35);
  pdf.text("Objektadresse:", 14, 45);
  pdf.text(adresse.value, 14, 52);
  pdf.text("Pauschale: " + betrag.value + " € zzgl. MwSt.", 14, 80);
  pdf.text("Ort: " + ort.value, 14, 90);
  pdf.text("Datum: " + datum.value, 14, 100);
  pdf.text("Unterschrift Auftraggeber:", 14, 115);

  pdf.addImage(signaturePad.toDataURL(), "PNG", 14, 120, 180, 50);
  pdf.save("Besuchsbestätigung_Aufmaß.pdf");
}
</script>

</body>
</html>
