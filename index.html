
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Besuchsbestätigung – Technisches Aufmaß</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}
h2 {
    text-align: center;
}
label {
    font-weight: bold;
    display: block;
    margin-top: 12px;
}
input {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
}
canvas {
    border: 1px solid #000;
    width: 100%;
    height: 200px;
    margin-top: 6px;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Besuchsbestätigung / Aufmaß‑Protokoll</h2>

<p><strong>Firma:</strong> Sichtwerk – Neubauer</p>

<p>
Hiermit bestätigt der Auftraggeber, dass durch die Firma <strong>Sichtwerk – Neubauer</strong>
ein <strong>technisches Aufmaß sowie eine Fachberatung vor Ort</strong> durchgeführt wurden.
</p>

<label>Ort</label>
<input id="ort">

<label>Datum</label>
<input type="date" id="datum">

<label>Unterschrift Auftraggeber</label>
<canvas id="signature"></canvas>

<button onclick="signaturePad.clear()">Unterschrift löschen</button>
<button onclick="generatePDF()">PDF erstellen</button>

<script>
const signaturePad = new SignaturePad(document.getElementById("signature"));

function generatePDF() {
    if (signaturePad.isEmpty()) {
        alert("Bitte unterschreiben");
        return;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    pdf.setFontSize(12);
    pdf.text("Besuchsbestätigung – Technisches Aufmaß", 14, 20);

    pdf.text("Firma: Sichtwerk – Neubauer", 14, 35);
    pdf.text("Ort: " + document.getElementById("ort").value, 14, 50);
    pdf.text("Datum: " + document.getElementById("datum").value, 14, 60);

    pdf.text(
        "Hiermit wird bestätigt, dass ein technisches Aufmaß sowie eine Fachberatung\nvor Ort durchgeführt wurden.",
        14,
        75
    );

    pdf.text("Unterschrift Auftraggeber:", 14, 105);

    pdf.addImage(
        signaturePad.toDataURL("image/png"),
        "PNG",
        14,
        110,
        180,
        50
    );

    pdf.save("Besuchsbestätigung_Aufmaß.pdf");
}
</script>

</body>
</html>
